<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="game.css" />
  </head>
  <body>
    <h1>rock paper sissor</h1>
    <div class="choices">
      <div id="rock" class="choice">
        <button><img src="stone.jpeg" alt="" srcset="" /></button>
      </div>
      <div id="paper" class="choice">
        <button><img src="paper.png" alt="" sizes="" srcset="" /></button>
      </div>
      <div id="scissor" class="choice">
        <button><img src="scisssor.png" alt="" srcset="" /></button>
      </div>
    </div>
    <div class="scoreboard">
      <div class="score">
        <p id="user-score">0</p>
        <p>my score</p>
      </div>
      <div class="score">
        <p id="comp-score">0</p>
        <p>computer score</p>
      </div>
    </div>
    <div class="msg-container">
      <div class="msg">play your move</div>
    </div>
    <script src="game.js"></script>
  </body>
</html>
